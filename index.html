<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="app">

    <!-- ── Header ─────────────────────────────── -->
    <header class="app-header">
      <div class="header-brand">
        <span class="brand-pilcrow">¶</span>
        <div class="brand-text">
          <h1 class="brand-title">Lorem Ipsum</h1>
          <span class="brand-sub">Placeholder Text Generator</span>
        </div>
      </div>

      <div class="header-stats" id="header-stats" aria-live="polite">
        <div class="stat-chip">
          <span class="stat-value" id="stat-words">—</span>
          <span class="stat-label">words</span>
        </div>
        <span class="stat-dot">·</span>
        <div class="stat-chip">
          <span class="stat-value" id="stat-chars">—</span>
          <span class="stat-label">chars</span>
        </div>
        <span class="stat-dot">·</span>
        <div class="stat-chip">
          <span class="stat-value" id="stat-paras">—</span>
          <span class="stat-label">paragraphs</span>
        </div>
      </div>
    </header>

    <!-- ── Controls ───────────────────────────── -->
    <div class="controls-bar">

      <div class="ctrl-group">
        <label class="ctrl-label" for="range-paragraphs">Paragraphs</label>
        <div class="range-row">
          <input type="range" id="range-paragraphs" class="range-input"
                 min="1" max="10" value="3" aria-valuemin="1" aria-valuemax="10" />
          <span class="range-badge" id="badge-paragraphs">3</span>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-group">
        <label class="ctrl-label" for="range-words">Words per paragraph</label>
        <div class="range-row">
          <input type="range" id="range-words" class="range-input"
                 min="20" max="150" value="75" step="5" aria-valuemin="20" aria-valuemax="150" />
          <span class="range-badge" id="badge-words">75</span>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-group ctrl-options">
        <span class="ctrl-label">Options</span>
        <div class="toggle-stack">
          <label class="toggle">
            <input type="checkbox" id="opt-lorem" class="toggle-checkbox" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label-text">Start with "Lorem ipsum…"</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="opt-html" class="toggle-checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label-text">Wrap in &lt;p&gt; HTML tags</span>
          </label>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-group ctrl-actions">
        <button class="btn btn-primary" id="btn-generate">Generate</button>
        <button class="btn btn-outline" id="btn-copy" disabled>Copy</button>
        <button class="btn btn-ghost"   id="btn-download" disabled>↓ .txt</button>
      </div>

    </div>

    <!-- ── Output ─────────────────────────────── -->
    <main class="output-area">

      <!-- Empty state -->
      <div class="output-empty" id="output-empty">
        <div class="empty-glyph">¶</div>
        <p class="empty-msg">
          Adjust the settings above and press <strong>Generate</strong><br />
          to fill this space with placeholder text.
        </p>
      </div>

      <!-- Generated content -->
      <div class="output-content" id="output-content" hidden></div>

    </main>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <script src="js/app.js"></script>
</body>
</html>
